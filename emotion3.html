<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="emotion1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="main-content">
        <div class="pic">
            <img src="sunflowers.jpg">
        </div>
        <div class="description">
            <button>Your Perfect Match is</button>
            <p>Sun Flowers</p>
            <span>Sunflowers are like a soul's medicine; they turn their heads toward the light just to remind us that even after the darkest night, we can bloom again.</span>
            <div class="msg">
                <div class="address">
                    <i class="fa-regular fa-heart"></i>
                    <span>Suggested Message</span>
                    
                </div>
                <div>
                    <p>"I hope this sunflower reminds you that you are the sun in someone's world."</p>
                </div>
            </div>    
        </div>
    </div>
    
</body>
</html>
